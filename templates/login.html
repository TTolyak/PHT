<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
    <title>Login. PHT</title>
</head>
<body>
    <nav><a href="/">Вернуться назад</a></nav>

    <div id="one_div">
        <form method="POST" action="/login">
            <div>
                <label>Имя пользователя:</label>
                <input type="text" name="username" required>
            </div>

            <div>
                <label>Пароль:</label>
                <input type="password" name="password" required>
            </div>

            <button id="id" type="submit">Войти</button>
        </form>
    </div>
</body>
</html>
